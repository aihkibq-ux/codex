<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>总览 — Share Everything</title>
    <meta name="description" content="探索所有文章，按分类浏览，搜索你感兴趣的内容。" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Google+Sans:wght@400;500;700&display=swap"
      rel="stylesheet"
      media="print" onload="this.media='all'"
    />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Google+Sans:wght@400;500;700&display=swap" /></noscript>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- Cursor Glow -->
    <div class="cursor-glow" id="cursorGlow"></div>

    <!-- Ambient Background -->
    <div class="ambient-background">
      <div class="glow-orb orb-1"></div>
      <div class="glow-orb orb-2"></div>
      <div class="glow-orb orb-3"></div>
    </div>

    <!-- Particles -->
    <canvas id="particles-canvas"></canvas>

    <main id="spa-content">
    <!-- Top Actions -->
    <div class="top-actions" id="topActions">
      <a href="index.html" class="action-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
          <polyline points="9 22 9 12 15 12 15 22" />
        </svg>
        <span>首页</span>
      </a>
      <a href="blog.html" class="action-btn active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" />
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" />
        </svg>
        <span>总览</span>
      </a>
      <a href="blog.html?category=收藏" class="action-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
        </svg>
        <span>收藏</span>
      </a>
    </div>

    <!-- Page Transition Wrapper -->
    <div class="page-transition-wrapper" id="pageWrapper">
      <!-- Content -->
      <div class="page-container">
        <div class="page-header">
          <h1 class="page-title">总览</h1>
        </div>

      <!-- Search -->
      <div class="blog-search">
        <input type="text" id="blogSearch" placeholder="搜索文章标题、内容或标签..." />
        <svg
          class="search-icon"
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
      </div>

      <!-- Category Filters -->
      <div class="blog-filters" id="blogFilters"></div>

      <!-- Blog Grid -->
      <div class="blog-grid" id="blogGrid"></div>

      <!-- Empty State -->
      <div class="empty-state" id="emptyState" style="display: none;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
        <p>没有找到匹配的文章</p>
        <p style="font-size: 0.85rem;">试试其他关键词或分类</p>
      </div>

      <!-- Pagination -->
      <div class="pagination" id="pagination"></div>
    </div>
    </div> <!-- End Page Transition Wrapper -->
    </main>

    <script src="js/common.js"></script>
    <script src="js/notion-api.js"></script>
    <script src="js/bookmark.js"></script>
    <script>
      /* ===== State ===== */
      let currentCategory = "全部";
      let currentSearch = "";
      let currentPage = 1;

      /* ===== URL Params ===== */
      const params = new URLSearchParams(window.location.search);
      if (params.get("category")) currentCategory = params.get("category");
      if (params.get("search")) currentSearch = params.get("search");
      if (params.get("page")) currentPage = parseInt(params.get("page")) || 1;

      /* ===== Update UI ===== */
      function updatePageUI() {
        const titleEl = document.querySelector(".page-title");
        if (titleEl) {
          titleEl.textContent = currentCategory === "全部" ? "总览" : currentCategory;
        }

        const topActions = document.querySelectorAll(".top-actions .action-btn");
        topActions.forEach(btn => btn.classList.remove("active"));
        
        topActions.forEach(btn => {
          const span = btn.querySelector("span");
          if (span) {
            const text = span.textContent.trim();
            if (currentCategory === "收藏" && text === "收藏") {
              btn.classList.add("active");
            } else if (currentCategory !== "收藏" && text === "总览") {
              btn.classList.add("active");
            }
          }
        });
      }

      updatePageUI();

      /* ===== Render Filters ===== */
      const filtersEl = document.getElementById("blogFilters");
      const categories = NotionAPI.getCategories();

      categories.forEach((cat) => {
        const btn = document.createElement("button");
        btn.className = `filter-btn${cat.name === currentCategory ? " active" : ""}`;
        btn.textContent = `${cat.emoji} ${cat.name}`;
        btn.addEventListener("click", () => {
          currentCategory = cat.name;
          currentPage = 1;
          updateURL();
          updatePageUI();
          renderPosts();
          // Update active state
          filtersEl.querySelectorAll(".filter-btn").forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
        });
        filtersEl.appendChild(btn);
      });

      /* ===== Search ===== */
      const searchInput = document.getElementById("blogSearch");
      searchInput.value = currentSearch;

      let searchDebounce = null;
      searchInput.addEventListener("input", () => {
        clearTimeout(searchDebounce);
        searchDebounce = setTimeout(() => {
          currentSearch = searchInput.value.trim();
          currentPage = 1;
          updateURL();
          renderPosts();
        }, 300);
      });

      /* ===== Render Posts ===== */
      const gridEl = document.getElementById("blogGrid");
      const emptyEl = document.getElementById("emptyState");
      const paginationEl = document.getElementById("pagination");

      async function renderPosts() {
        try {
          let data;

          // "收藏" 分类 → 显示本地收藏的文章
          if (currentCategory === "收藏") {
            let bookmarks = BookmarkManager.getAll();
            // 搜索过滤
            if (currentSearch) {
              const q = currentSearch.toLowerCase();
              bookmarks = bookmarks.filter(p =>
                p.title.toLowerCase().includes(q) ||
                (p.excerpt || "").toLowerCase().includes(q)
              );
            }
            const total = bookmarks.length;
            const totalPages = Math.max(1, Math.ceil(total / 9));
            const cp = Math.min(currentPage, totalPages);
            const start = (cp - 1) * 9;
            data = { results: bookmarks.slice(start, start + 9), total, totalPages, currentPage: cp };
          } else {
            data = await NotionAPI.queryPosts({
              category: currentCategory,
              search: currentSearch,
              page: currentPage,
            });
          }

          if (data.results.length === 0) {
            gridEl.innerHTML = "";
            emptyEl.style.display = "flex";
            paginationEl.innerHTML = "";
            return;
          }

          emptyEl.style.display = "none";
          gridEl.innerHTML = data.results.map(renderCard).join("");
          renderPagination(data);

          // Trigger reveal animation
          requestAnimationFrame(() => {
            window.initBlogCardReveal();
          });

          // Save to reading history
          saveHistory();
        } catch (error) {
          console.error("Failed to load posts:", error);
          gridEl.innerHTML = "";
          emptyEl.style.display = "flex";
          paginationEl.innerHTML = "";
        }
      }

      function renderCard(post) {
        const esc = NotionAPI.escapeHtml;
        const catColor = NotionAPI.getCategoryColor(post.category);
        const bookmarked = BookmarkManager.isBookmarked(post.id);

        const safeTitle = esc(post.title);
        const safeExcerpt = esc(post.excerpt);
        const safeCategory = esc(post.category);

        const coverHtml = post.coverImage
          ? `<div class="blog-card-cover-placeholder blog-card-cover-img">
               <img src="${esc(post.coverImage)}" alt="${safeTitle}" loading="lazy" onerror="this.parentElement.classList.remove('blog-card-cover-img');this.remove()">
             </div>`
          : `<div class="blog-card-cover-placeholder" style="background: ${post.coverGradient || 'linear-gradient(135deg, #1a1a2e, #16213e)'}">
               <span>${post.coverEmoji || '📝'}</span>
             </div>`;
        return `
          <a href="post.html?id=${encodeURIComponent(post.id)}" class="blog-card" data-reveal data-post-id="${esc(post.id)}">
            ${coverHtml}
            <div class="blog-card-body">
              <div class="blog-card-category" style="background: ${catColor.bg}; color: ${catColor.color}; border-color: ${catColor.border}">${safeCategory}</div>
              <h3 class="blog-card-title">${safeTitle}</h3>
              <p class="blog-card-excerpt">${safeExcerpt}</p>
              <div class="blog-card-meta">
                <span>
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="16" y1="2" x2="16" y2="6"></line>
                    <line x1="8" y1="2" x2="8" y2="6"></line>
                    <line x1="3" y1="10" x2="21" y2="10"></line>
                  </svg>
                  ${esc(post.date)}
                </span>
                <span>
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polyline points="12 6 12 12 16 14"></polyline>
                  </svg>
                  ${esc(post.readTime)}
                </span>
                <button class="card-bookmark-btn${bookmarked ? ' bookmarked' : ''}" data-bookmark-id="${esc(post.id)}" title="${bookmarked ? '取消收藏' : '收藏'}">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
                  </svg>
                </button>
              </div>
            </div>
          </a>
        `;
      }

      /* ===== Pagination ===== */
      function renderPagination(data) {
        if (data.totalPages <= 1) {
          paginationEl.innerHTML = "";
          return;
        }

        let html = "";
        for (let i = 1; i <= data.totalPages; i++) {
          html += `<button class="page-btn${i === data.currentPage ? " active" : ""}" data-page="${i}">${i}</button>`;
        }
        paginationEl.innerHTML = html;

        paginationEl.querySelectorAll(".page-btn").forEach((btn) => {
          btn.addEventListener("click", () => {
            currentPage = parseInt(btn.dataset.page);
            updateURL();
            renderPosts();
            window.scrollTo({ top: 0, behavior: "smooth" });
          });
        });
      }

      /* ===== URL Management ===== */
      function updateURL() {
        const params = new URLSearchParams();
        if (currentCategory !== "全部") params.set("category", currentCategory);
        if (currentSearch) params.set("search", currentSearch);
        if (currentPage > 1) params.set("page", currentPage);
        const qs = params.toString();
        history.replaceState(null, "", qs ? `${window.location.pathname}?${qs}` : window.location.pathname);
      }

      /* ===== Reading History (localStorage) ===== */
      function saveHistory() {
        try {
          const entries = JSON.parse(localStorage.getItem("blog_history") || "[]");
          const entry = {
            url: window.location.href,
            category: currentCategory,
            search: currentSearch,
            timestamp: Date.now(),
          };
          entries.unshift(entry);
          // Keep last 50
          localStorage.setItem("blog_history", JSON.stringify(entries.slice(0, 50)));
        } catch (e) {
          // localStorage not available
        }
      }

      /* ===== Bookmark (收藏 — via BookmarkManager) ===== */

      // 事件委托：处理卡片上的收藏按钮点击
      gridEl.addEventListener('click', (e) => {
        const btn = e.target.closest('.card-bookmark-btn');
        if (!btn) return;
        e.preventDefault();
        e.stopPropagation();

        const postId = btn.dataset.bookmarkId;
        const nowBookmarked = BookmarkManager.toggleById(postId);

        btn.classList.toggle('bookmarked', nowBookmarked);
        btn.title = nowBookmarked ? '取消收藏' : '收藏';

        // 弹跳动画
        btn.classList.remove('bounce');
        void btn.offsetWidth;
        btn.classList.add('bounce');

        // 如果在「收藏」分类下取消收藏，重新渲染列表
        if (!nowBookmarked && currentCategory === '收藏') {
          setTimeout(() => renderPosts(), 300);
        }
      });

      /* ===== Init ===== */
      renderPosts();
    </script>
  </body>
</html>
