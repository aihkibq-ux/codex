<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>&#x603B;&#x89C8; - Share Everything</title>
    <meta
      name="description"
      content="&#x63A2;&#x7D22;&#x6240;&#x6709;&#x6587;&#x7AE0;&#xFF0C;&#x6309;&#x5206;&#x7C7B;&#x6D4F;&#x89C8;&#xFF0C;&#x641C;&#x7D22;&#x4F60;&#x611F;&#x5174;&#x8DA3;&#x7684;&#x5185;&#x5BB9;&#x3002;"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Google+Sans:wght@400;500;700&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Google+Sans:wght@400;500;700&display=swap"
      />
    </noscript>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="top-actions" id="topActions">
      <a href="index.html" class="action-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
          <polyline points="9 22 9 12 15 12 15 22" />
        </svg>
        <span>&#x9996;&#x9875;</span>
      </a>
      <a href="blog.html" class="action-btn active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" />
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" />
        </svg>
        <span>&#x603B;&#x89C8;</span>
      </a>
      <a href="blog.html?category=%E6%94%B6%E8%97%8F" class="action-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
        </svg>
        <span>&#x6536;&#x85CF;</span>
      </a>
    </div>

    <div class="cursor-glow" id="cursorGlow"></div>

    <div class="ambient-background">
      <div class="glow-orb orb-1"></div>
      <div class="glow-orb orb-2"></div>
      <div class="glow-orb orb-3"></div>
    </div>

    <canvas id="particles-canvas"></canvas>

    <div class="page-transition-wrapper" id="pageWrapper">
      <div class="page-container">
        <div class="page-header">
          <h1 class="page-title">&#x603B;&#x89C8;</h1>
        </div>

        <div class="blog-search">
          <input
            type="text"
            id="blogSearch"
            placeholder="&#x641C;&#x7D22;&#x6587;&#x7AE0;&#x6807;&#x9898;&#x3001;&#x5185;&#x5BB9;&#x6216;&#x6807;&#x7B7E;..."
          />
          <svg
            class="search-icon"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
        </div>

        <div class="blog-filters" id="blogFilters"></div>
        <div class="blog-grid" id="blogGrid"></div>

        <div class="empty-state" id="emptyState" style="display: none;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <p>&#x6CA1;&#x6709;&#x627E;&#x5230;&#x5339;&#x914D;&#x7684;&#x6587;&#x7AE0;</p>
          <p style="font-size: 0.85rem;">
            &#x8BD5;&#x8BD5;&#x5176;&#x4ED6;&#x5173;&#x952E;&#x8BCD;&#x6216;&#x5206;&#x7C7B;
          </p>
        </div>

        <div class="pagination" id="pagination"></div>
      </div>
    </div>

    <script src="js/common.js"></script>
    <script src="js/notion-api.js"></script>
    <script>
      const CATEGORY_ALL = NotionAPI.CATEGORY_ALL;
      const CATEGORY_FAVORITES = NotionAPI.CATEGORY_FAVORITES;
      const PAGE_TITLE_ALL = "\u603b\u89c8";
      const PAGE_SIZE = 9;
      const BOOKMARK_KEY = "bookmarked_posts";
      const BLOG_HISTORY_KEY = "blog_history";

      const filtersEl = document.getElementById("blogFilters");
      const searchInput = document.getElementById("blogSearch");
      const gridEl = document.getElementById("blogGrid");
      const emptyEl = document.getElementById("emptyState");
      const paginationEl = document.getElementById("pagination");
      const pageTitleEl = document.querySelector(".page-title");
      const categories = NotionAPI.getCategories();
      const params = new URLSearchParams(window.location.search);

      let currentCategory = params.get("category") || CATEGORY_ALL;
      let currentSearch = params.get("search") || "";
      let currentPage = Math.max(1, Number.parseInt(params.get("page"), 10) || 1);
      let searchDebounce = null;
      let renderToken = 0;
      let renderedPostMap = new Map();
      let bookmarks = window.SiteStore.readList(BOOKMARK_KEY);
      let bookmarkedIds = new Set(bookmarks.map((post) => post.id));

      function syncBookmarks(nextBookmarks) {
        bookmarks = nextBookmarks;
        bookmarkedIds = new Set(nextBookmarks.map((post) => post.id));
      }

      function getBookmarkButtonTitle(isActive) {
        return isActive ? "\u53d6\u6d88\u6536\u85cf" : "\u6536\u85cf";
      }

      function renderFilters() {
        const esc = NotionAPI.escapeHtml;
        filtersEl.innerHTML = categories
          .map((category) => {
            const isActive = category.name === currentCategory;
            return `
              <button
                type="button"
                class="filter-btn${isActive ? " active" : ""}"
                data-category="${esc(category.name)}"
              >
                ${esc(category.emoji)} ${esc(category.name)}
              </button>
            `;
          })
          .join("");
      }

      function updatePageUI() {
        if (pageTitleEl) {
          pageTitleEl.textContent =
            currentCategory === CATEGORY_ALL ? PAGE_TITLE_ALL : currentCategory;
        }

        document.querySelectorAll(".top-actions .action-btn").forEach((button) => {
          button.classList.remove("active");
        });

        const activeTopAction = document.querySelector(
          currentCategory === CATEGORY_FAVORITES
            ? '.top-actions .action-btn[href="blog.html?category=%E6%94%B6%E8%97%8F"]'
            : '.top-actions .action-btn[href="blog.html"]',
        );
        activeTopAction?.classList.add("active");

        filtersEl.querySelectorAll(".filter-btn").forEach((button) => {
          button.classList.toggle(
            "active",
            button.dataset.category === currentCategory,
          );
        });
      }

      function updateURL() {
        const nextParams = new URLSearchParams();
        if (currentCategory !== CATEGORY_ALL) {
          nextParams.set("category", currentCategory);
        }
        if (currentSearch) {
          nextParams.set("search", currentSearch);
        }
        if (currentPage > 1) {
          nextParams.set("page", String(currentPage));
        }

        const nextQuery = nextParams.toString();
        history.replaceState(null, "", nextQuery ? `?${nextQuery}` : "blog.html");
      }

      function saveHistory() {
        const entry = {
          url: window.location.href,
          category: currentCategory,
          search: currentSearch,
          timestamp: Date.now(),
        };

        const entries = window.SiteStore
          .readList(BLOG_HISTORY_KEY)
          .filter((item) => {
            return !(
              item.url === entry.url &&
              item.category === entry.category &&
              item.search === entry.search
            );
          });

        entries.unshift(entry);
        window.SiteStore.writeList(BLOG_HISTORY_KEY, entries.slice(0, 50));
      }

      function getVisibleBookmarks() {
        if (!currentSearch) {
          return bookmarks.slice();
        }

        const normalizedSearch = currentSearch.toLowerCase();
        return bookmarks.filter((post) => {
          return (
            post.title.toLowerCase().includes(normalizedSearch) ||
            (post.excerpt || "").toLowerCase().includes(normalizedSearch)
          );
        });
      }

      function renderPagination(data) {
        if (data.totalPages <= 1) {
          paginationEl.innerHTML = "";
          return;
        }

        paginationEl.innerHTML = Array.from(
          { length: data.totalPages },
          (_, index) => {
            const page = index + 1;
            return `<button type="button" class="page-btn${page === data.currentPage ? " active" : ""}" data-page="${page}">${page}</button>`;
          },
        ).join("");
      }

      function renderCard(post) {
        const esc = NotionAPI.escapeHtml;
        const categoryColor = NotionAPI.getCategoryColor(post.category);
        const isActive = bookmarkedIds.has(post.id);
        const safeTitle = esc(post.title);
        const safeExcerpt = esc(post.excerpt);
        const safeCategory = esc(post.category);

        const coverHtml = post.coverImage
          ? `<div class="blog-card-cover-placeholder blog-card-cover-img">
               <img src="${esc(post.coverImage)}" alt="${safeTitle}" loading="lazy" decoding="async" onerror="this.parentElement.classList.remove('blog-card-cover-img');this.remove()">
             </div>`
          : `<div class="blog-card-cover-placeholder" style="background: ${post.coverGradient || "linear-gradient(135deg, #1a1a2e, #16213e)"}">
               <span>${esc(post.coverEmoji || "\ud83d\udcd8")}</span>
             </div>`;

        return `
          <a href="post.html?id=${encodeURIComponent(post.id)}" class="blog-card" data-post-id="${esc(post.id)}">
            ${coverHtml}
            <div class="blog-card-body">
              <div class="blog-card-category" style="background: ${categoryColor.bg}; color: ${categoryColor.color}; border-color: ${categoryColor.border}">${safeCategory}</div>
              <h3 class="blog-card-title">${safeTitle}</h3>
              <p class="blog-card-excerpt">${safeExcerpt}</p>
              <div class="blog-card-meta">
                <span>
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="16" y1="2" x2="16" y2="6"></line>
                    <line x1="8" y1="2" x2="8" y2="6"></line>
                    <line x1="3" y1="10" x2="21" y2="10"></line>
                  </svg>
                  ${esc(post.date)}
                </span>
                <span>
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polyline points="12 6 12 12 16 14"></polyline>
                  </svg>
                  ${esc(post.readTime)}
                </span>
                <button
                  type="button"
                  class="card-bookmark-btn${isActive ? " bookmarked" : ""}"
                  data-bookmark-id="${esc(post.id)}"
                  title="${getBookmarkButtonTitle(isActive)}"
                  aria-label="${getBookmarkButtonTitle(isActive)}"
                >
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
                  </svg>
                </button>
              </div>
            </div>
          </a>
        `;
      }

      function createBookmarkedPost(postId) {
        const post = renderedPostMap.get(postId);
        if (!post) {
          return null;
        }

        return {
          id: post.id,
          title: post.title,
          excerpt: post.excerpt || "",
          category: post.category,
          date: post.date || "",
          readTime: post.readTime || "",
          coverImage: post.coverImage || null,
          coverEmoji: post.coverEmoji || "\ud83d\udcd8",
          coverGradient: post.coverGradient || null,
          timestamp: Date.now(),
        };
      }

      function toggleBookmarkById(postId) {
        const isActive = bookmarkedIds.has(postId);
        if (isActive) {
          const nextBookmarks = bookmarks.filter((post) => post.id !== postId);
          syncBookmarks(nextBookmarks);
          window.SiteStore.writeList(BOOKMARK_KEY, nextBookmarks);
          return false;
        }

        const nextPost = createBookmarkedPost(postId);
        if (!nextPost) {
          return false;
        }

        const nextBookmarks = [
          nextPost,
          ...bookmarks.filter((post) => post.id !== postId),
        ];
        syncBookmarks(nextBookmarks);
        window.SiteStore.writeList(BOOKMARK_KEY, nextBookmarks);
        return true;
      }

      async function renderPosts() {
        const token = ++renderToken;

        try {
          let data;

          if (currentCategory === CATEGORY_FAVORITES) {
            const results = getVisibleBookmarks();
            const total = results.length;
            const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
            const safePage = Math.min(currentPage, totalPages);
            const start = (safePage - 1) * PAGE_SIZE;

            data = {
              results: results.slice(start, start + PAGE_SIZE),
              total,
              totalPages,
              currentPage: safePage,
            };
          } else {
            data = await NotionAPI.queryPosts({
              category: currentCategory,
              search: currentSearch,
              page: currentPage,
            });
          }

          if (token !== renderToken) {
            return;
          }

          currentPage = data.currentPage;
          renderedPostMap = new Map(data.results.map((post) => [post.id, post]));
          updatePageUI();
          updateURL();

          if (!data.results.length) {
            gridEl.innerHTML = "";
            emptyEl.style.display = "flex";
            paginationEl.innerHTML = "";
            return;
          }

          emptyEl.style.display = "none";
          gridEl.innerHTML = data.results.map(renderCard).join("");
          renderPagination(data);
          requestAnimationFrame(() => window.initBlogCardReveal?.());
          saveHistory();
        } catch (error) {
          if (token !== renderToken) {
            return;
          }

          console.error("Failed to load posts:", error);
          renderedPostMap = new Map();
          gridEl.innerHTML = "";
          emptyEl.style.display = "flex";
          paginationEl.innerHTML = "";
        }
      }

      renderFilters();
      updatePageUI();
      searchInput.value = currentSearch;

      filtersEl.addEventListener("click", (event) => {
        const button = event.target.closest(".filter-btn");
        if (!button) {
          return;
        }

        const nextCategory = button.dataset.category;
        if (!nextCategory || nextCategory === currentCategory) {
          return;
        }

        currentCategory = nextCategory;
        currentPage = 1;
        renderPosts();
      });

      searchInput.addEventListener("input", () => {
        window.clearTimeout(searchDebounce);
        searchDebounce = window.setTimeout(() => {
          currentSearch = searchInput.value.trim();
          currentPage = 1;
          renderPosts();
        }, 300);
      });

      paginationEl.addEventListener("click", (event) => {
        const button = event.target.closest(".page-btn");
        if (!button) {
          return;
        }

        const nextPage = Number.parseInt(button.dataset.page, 10);
        if (!nextPage || nextPage === currentPage) {
          return;
        }

        currentPage = nextPage;
        renderPosts();
        window.scrollTo({ top: 0, behavior: "smooth" });
      });

      gridEl.addEventListener("click", (event) => {
        const button = event.target.closest(".card-bookmark-btn");
        if (!button) {
          return;
        }

        event.preventDefault();
        event.stopPropagation();

        const postId = button.dataset.bookmarkId;
        if (!postId) {
          return;
        }

        const isActive = toggleBookmarkById(postId);
        button.classList.toggle("bookmarked", isActive);
        button.title = getBookmarkButtonTitle(isActive);
        button.setAttribute("aria-label", getBookmarkButtonTitle(isActive));

        button.classList.remove("bounce");
        void button.offsetWidth;
        button.classList.add("bounce");

        if (!isActive && currentCategory === CATEGORY_FAVORITES) {
          window.setTimeout(() => {
            renderPosts();
          }, 300);
        }
      });

      renderPosts();
    </script>
  </body>
</html>
