<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Share Everything</title>
    <meta
      name="description"
      content="Share Everything - &#x63A2;&#x7D22;&#x3001;&#x8BB0;&#x5F55;&#x3001;&#x5206;&#x4EAB;"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Google+Sans:wght@400;500;700&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Google+Sans:wght@400;500;700&display=swap"
      />
    </noscript>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="cursor-glow" id="cursorGlow"></div>

    <div class="ambient-background">
      <div class="glow-orb orb-1"></div>
      <div class="glow-orb orb-2"></div>
      <div class="glow-orb orb-3"></div>
    </div>

    <canvas id="particles-canvas"></canvas>

    <div class="content-layer">
      <section class="hero-section" id="hero">
        <h1 class="hero-title">Share Everything</h1>

        <div class="hero-search">
          <input
            type="text"
            id="heroSearch"
            placeholder="&#x641C;&#x7D22;&#x6587;&#x7AE0;&#x6216;&#x4E3B;&#x9898;"
            aria-label="&#x641C;&#x7D22;&#x6587;&#x7AE0;"
          />
          <svg
            class="search-icon"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
        </div>

        <div class="hero-cta-group">
          <button class="btn btn-home" id="ctaHome" type="button">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
              <polyline points="9 22 9 12 15 12 15 22" />
            </svg>
            <span class="btn-tooltip">&#x603B;&#x89C8;</span>
          </button>
          <button class="btn btn-primary" id="ctaStart" type="button">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
            </svg>
            <span class="btn-tooltip">&#x7CBE;&#x9009;</span>
          </button>
          <button class="btn btn-wiki" id="ctaWiki" type="button">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
              <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
            </svg>
            <span class="btn-tooltip">&#x6536;&#x85CF;</span>
          </button>
        </div>
      </section>
    </div>

    <script src="js/common.js"></script>
    <script>
      const searchInput = document.getElementById("heroSearch");
      const searchIcon = document.querySelector(".search-icon");
      const homeButton = document.getElementById("ctaHome");
      const startButton = document.getElementById("ctaStart");
      const favoritesButton = document.getElementById("ctaWiki");

      function navigateToBlog(query = "") {
        window.location.href = query ? `blog.html?${query}` : "blog.html";
      }

      function executeSearch() {
        const query = searchInput.value.trim();
        if (!query) {
          return;
        }

        navigateToBlog(`search=${encodeURIComponent(query)}`);
      }

      searchInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          executeSearch();
        }
      });

      searchIcon.addEventListener("click", executeSearch);
      homeButton.addEventListener("click", () => navigateToBlog());
      startButton.addEventListener("click", () => {
        navigateToBlog(`category=${encodeURIComponent("\u7cbe\u9009")}`);
      });
      favoritesButton.addEventListener("click", () => {
        navigateToBlog(`category=${encodeURIComponent("\u6536\u85cf")}`);
      });
    </script>
  </body>
</html>
