<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Share Everything</title>
    <meta name="description" content="Share Everything — 探索、记录、分享" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Google+Sans:wght@400;500;700&display=swap"
      rel="stylesheet"
      media="print" onload="this.media='all'"
    />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Google+Sans:wght@400;500;700&display=swap" /></noscript>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>

    <!-- Cursor Glow -->
    <div class="cursor-glow" id="cursorGlow"></div>

    <!-- Ambient Background -->
    <div class="ambient-background">
      <div class="glow-orb orb-1"></div>
      <div class="glow-orb orb-2"></div>
      <div class="glow-orb orb-3"></div>
    </div>

    <!-- Particles -->
    <canvas id="particles-canvas"></canvas>

    <!-- Content -->
    <main id="spa-content">
    <div class="content-layer">
      <!-- Hero -->
      <section class="hero-section" id="hero">
        <h1 class="hero-title">Share Everything</h1>
        <div class="hero-search">
          <input type="text" id="heroSearch" />
          <svg
            class="search-icon"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
        </div>
        <div class="hero-cta-group">
          <button class="btn btn-home" id="ctaHome">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
              <polyline points="9 22 9 12 15 12 15 22" />
            </svg>
            <span class="btn-tooltip">总览</span>
          </button>
          <button class="btn btn-primary" id="ctaStart">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
            </svg>
            <span class="btn-tooltip">精选</span>
          </button>
          <button class="btn btn-wiki" id="ctaWiki">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
              <path
                d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"
              />
            </svg>
            <span class="btn-tooltip">收藏</span>
          </button>
        </div>
      </section>


    </div>
    </main>

    <script src="js/common.js"></script>
    <script>
      /* ===== Search → Blog ===== */
      const searchInput = document.getElementById("heroSearch");
      const searchIcon = document.querySelector(".search-icon");

      function executeSearch() {
        const query = searchInput.value.trim();
        if (query) {
          SPARouter.navigate(`blog.html?search=${encodeURIComponent(query)}`);
        }
      }

      searchInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") executeSearch();
      });
      searchIcon.addEventListener("click", executeSearch);

      /* ===== Button Routes ===== */
      document.getElementById("ctaHome").addEventListener("click", () => {
        SPARouter.navigate("blog.html");
      });
      document.getElementById("ctaStart").addEventListener("click", () => {
        SPARouter.navigate("blog.html?category=精选");
      });
      document.getElementById("ctaWiki").addEventListener("click", () => {
        SPARouter.navigate("blog.html?category=收藏");
      });
    </script>
  </body>
</html>
