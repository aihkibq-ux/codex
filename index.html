<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Share Everything</title>
    <meta name="description" content="Share Everything - 探索、记录、分享" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Google+Sans:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="cursor-glow" id="cursorGlow"></div>

    <div class="ambient-background">
      <div class="glow-orb orb-1"></div>
      <div class="glow-orb orb-2"></div>
      <div class="glow-orb orb-3"></div>
      <div class="glow-orb orb-4"></div>
      <div class="glow-orb orb-5"></div>
    </div>

    <canvas id="particles-canvas"></canvas>

    <div class="content-layer">
      <section class="hero-section" id="hero">
        <h1 class="hero-title">Share Everything</h1>
        <div class="hero-search">
          <input type="text" id="heroSearch" placeholder="搜索文章..." aria-label="搜索文章" />
          <svg
            class="search-icon"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
        </div>

        <div class="hero-cta-group">
          <button class="btn btn-home" id="ctaHome" type="button" aria-label="前往总览">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
              <polyline points="9 22 9 12 15 12 15 22" />
            </svg>
            <span class="btn-tooltip">总览</span>
          </button>

          <button class="btn btn-primary" id="ctaStart" type="button" aria-label="开始浏览">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polygon points="5 3 19 12 5 21 5 3" />
            </svg>
            <span class="btn-tooltip">继续</span>
          </button>

          <button class="btn btn-wiki" id="ctaWiki" type="button" aria-label="查看收藏">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
              <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
            </svg>
            <span class="btn-tooltip">收藏</span>
          </button>
        </div>
      </section>
    </div>

    <script src="js/common.js"></script>
    <script src="js/notion-api.js"></script>
    <script>
      const searchInput = document.getElementById("heroSearch");
      const searchIcon = document.querySelector(".search-icon");

      function executeSearch() {
        const query = searchInput.value.trim();
        if (!query) return;
        window.location.href = `blog.html?search=${encodeURIComponent(query)}`;
      }

      searchInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") executeSearch();
      });

      searchIcon.addEventListener("click", executeSearch);
      searchIcon.setAttribute("role", "button");
      searchIcon.setAttribute("tabindex", "0");
      searchIcon.setAttribute("aria-label", "执行搜索");
      searchIcon.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          executeSearch();
        }
      });

      document.getElementById("ctaHome").addEventListener("click", () => {
        window.location.href = "blog.html";
      });
      document.getElementById("ctaStart").addEventListener("click", () => {
        window.location.href = "blog.html";
      });
      document.getElementById("ctaWiki").addEventListener("click", () => {
        window.location.href = "blog.html?category=%E6%94%B6%E8%97%8F";
      });
    </script>
  </body>
</html>
