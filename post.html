<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>&#x6587;&#x7AE0; - Share Everything</title>
    <meta name="description" content="&#x9605;&#x8BFB;&#x6587;&#x7AE0;&#x8BE6;&#x60C5;" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Google+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Google+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap"
      />
    </noscript>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="top-actions" id="topActions">
      <a href="index.html" class="action-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
          <polyline points="9 22 9 12 15 12 15 22" />
        </svg>
        <span>&#x9996;&#x9875;</span>
      </a>
      <a href="blog.html" class="action-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" />
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" />
        </svg>
        <span>&#x603B;&#x89C8;</span>
      </a>
      <a href="blog.html?category=%E6%94%B6%E8%97%8F" class="action-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
        </svg>
        <span>&#x6536;&#x85CF;</span>
      </a>
    </div>

    <div class="cursor-glow" id="cursorGlow"></div>

    <div class="ambient-background">
      <div class="glow-orb orb-1"></div>
      <div class="glow-orb orb-2"></div>
      <div class="glow-orb orb-3"></div>
    </div>

    <canvas id="particles-canvas"></canvas>

    <div class="page-transition-wrapper" id="pageWrapper">
      <div class="post-container">
        <article class="post-article" id="postArticle">
          <button class="post-back" id="postBack" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="19" y1="12" x2="5" y2="12"></line>
              <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            &#x8FD4;&#x56DE;&#x5217;&#x8868;
          </button>

          <div id="postSkeleton">
            <div class="skeleton" style="width: 80px; height: 24px; margin-bottom: 20px;"></div>
            <div class="skeleton" style="width: 100%; height: 48px; margin-bottom: 12px;"></div>
            <div class="skeleton" style="width: 60%; height: 48px; margin-bottom: 24px;"></div>
            <div class="skeleton" style="width: 200px; height: 20px; margin-bottom: 48px;"></div>
            <div class="skeleton" style="width: 100%; height: 300px; margin-bottom: 32px;"></div>
            <div class="skeleton" style="width: 100%; height: 20px; margin-bottom: 12px;"></div>
            <div class="skeleton" style="width: 90%; height: 20px; margin-bottom: 12px;"></div>
            <div class="skeleton" style="width: 75%; height: 20px; margin-bottom: 12px;"></div>
          </div>

          <div id="postContent" style="display: none;"></div>
        </article>

        <button class="fab-bookmark" id="fabBookmark" style="display: none;" aria-label="&#x6536;&#x85CF;&#x6587;&#x7AE0;" type="button">
          <svg class="fab-bookmark-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
          </svg>
          <span class="fab-bookmark-label">&#x6536;&#x85CF;</span>
        </button>

        <div class="empty-state" id="postEmpty" style="display: none;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
          </svg>
          <p>&#x6587;&#x7AE0;&#x4E0D;&#x5B58;&#x5728;</p>
          <p style="font-size: 0.85rem;">
            <a href="blog.html" style="color: var(--accent-cyan); text-decoration: none;">&#x8FD4;&#x56DE;&#x535A;&#x5BA2;&#x5217;&#x8868;</a>
          </p>
        </div>
      </div>
    </div>

    <script src="js/common.js"></script>
    <script src="js/notion-api.js"></script>
    <script>
      const BOOKMARK_KEY = "bookmarked_posts";
      const READING_HISTORY_KEY = "reading_history";
      const params = new URLSearchParams(window.location.search);
      const postId = params.get("id");

      const articleEl = document.getElementById("postArticle");
      const backButtonEl = document.getElementById("postBack");
      const skeletonEl = document.getElementById("postSkeleton");
      const contentEl = document.getElementById("postContent");
      const emptyEl = document.getElementById("postEmpty");
      const fabEl = document.getElementById("fabBookmark");
      const fabLabelEl = fabEl.querySelector(".fab-bookmark-label");
      const descriptionMetaEl = document.querySelector('meta[name="description"]');

      let loadToken = 0;
      let currentPost = null;
      let bookmarks = window.SiteStore.readList(BOOKMARK_KEY);
      let bookmarkedIds = new Set(bookmarks.map((post) => post.id));

      function syncBookmarks(nextBookmarks) {
        bookmarks = nextBookmarks;
        bookmarkedIds = new Set(nextBookmarks.map((post) => post.id));
      }

      function getBookmarkLabel(isActive) {
        return isActive ? "\u5df2\u6536\u85cf" : "\u6536\u85cf";
      }

      function saveReadingHistory(post) {
        const entries = window.SiteStore
          .readList(READING_HISTORY_KEY)
          .filter((item) => item.id !== post.id);

        entries.unshift({
          id: post.id,
          title: post.title,
          category: post.category,
          timestamp: Date.now(),
        });

        window.SiteStore.writeList(READING_HISTORY_KEY, entries.slice(0, 100));
      }

      function updateBookmarkUI() {
        if (!currentPost) {
          fabEl.style.display = "none";
          return;
        }

        const isActive = bookmarkedIds.has(currentPost.id);
        fabEl.style.display = "flex";
        fabEl.classList.toggle("bookmarked", isActive);
        fabLabelEl.textContent = getBookmarkLabel(isActive);
        fabEl.setAttribute("aria-label", getBookmarkLabel(isActive));
      }

      function toggleBookmark(post) {
        const isActive = bookmarkedIds.has(post.id);
        if (isActive) {
          const nextBookmarks = bookmarks.filter((item) => item.id !== post.id);
          syncBookmarks(nextBookmarks);
          window.SiteStore.writeList(BOOKMARK_KEY, nextBookmarks);
          return false;
        }

        const nextBookmarks = [
          {
            id: post.id,
            title: post.title,
            category: post.category,
            excerpt: post.excerpt || "",
            date: post.date || "",
            readTime: post.readTime || "",
            coverImage: post.coverImage || null,
            coverEmoji: post.coverEmoji || "\ud83d\udcd8",
            coverGradient: post.coverGradient || null,
            timestamp: Date.now(),
          },
          ...bookmarks.filter((item) => item.id !== post.id),
        ];

        syncBookmarks(nextBookmarks);
        window.SiteStore.writeList(BOOKMARK_KEY, nextBookmarks);
        return true;
      }

      function showEmpty() {
        skeletonEl.style.display = "none";
        contentEl.style.display = "none";
        fabEl.style.display = "none";
        backButtonEl.style.display = "none";
        emptyEl.style.display = "flex";
      }

      function renderPost(post) {
        const esc = NotionAPI.escapeHtml;
        const categoryColor = NotionAPI.getCategoryColor(post.category);
        const renderedContent = NotionAPI.renderBlocks(post.content || []);

        document.title = `${post.title} - Share Everything`;
        if (descriptionMetaEl) {
          descriptionMetaEl.content = post.excerpt || post.title;
        }

        contentEl.innerHTML = `
          <div class="post-header">
            <div class="post-category" style="background: ${categoryColor.bg}; color: ${categoryColor.color}; border: 1px solid ${categoryColor.border};">
              ${esc(post.category)}
            </div>
            <h1 class="post-title">${esc(post.title)}</h1>
            <div class="post-meta">
              <span>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                  <line x1="16" y1="2" x2="16" y2="6"></line>
                  <line x1="8" y1="2" x2="8" y2="6"></line>
                  <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
                ${esc(post.date)}
              </span>
              <span>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="10"></circle>
                  <polyline points="12 6 12 12 16 14"></polyline>
                </svg>
                ${esc(post.readTime)}
              </span>
              ${post.tags?.length ? `<span>${post.tags.map((tag) => `#${esc(tag)}`).join(" ")}</span>` : ""}
            </div>
          </div>
          <div class="post-content">
            ${renderedContent}
          </div>
        `;

        skeletonEl.style.display = "none";
        emptyEl.style.display = "none";
        contentEl.style.display = "block";
        contentEl.style.animation = "fadeInUp 0.6s ease both";
      }

      async function loadPost() {
        const token = ++loadToken;

        if (!postId) {
          showEmpty();
          return;
        }

        try {
          const post = await NotionAPI.getPost(postId);
          if (token !== loadToken) {
            return;
          }

          if (!post) {
            showEmpty();
            return;
          }

          currentPost = post;
          renderPost(post);
          saveReadingHistory(post);
          updateBookmarkUI();
        } catch (error) {
          if (token !== loadToken) {
            return;
          }

          console.error("Failed to load post:", error);
          showEmpty();
        }
      }

      backButtonEl.addEventListener("click", () => {
        if (window.history.length > 1) {
          window.history.back();
          return;
        }

        window.location.href = "blog.html";
      });

      fabEl.addEventListener("click", () => {
        if (!currentPost) {
          return;
        }

        const isActive = toggleBookmark(currentPost);
        updateBookmarkUI();

        fabEl.classList.remove("bounce");
        void fabEl.offsetWidth;
        fabEl.classList.add("bounce");

        if (!isActive) {
          fabEl.blur();
        }
      });

      loadPost();
    </script>
  </body>
</html>
