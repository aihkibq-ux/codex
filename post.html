<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>文章 - Share Everything</title>
    <meta name="description" content="阅读文章详情" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Google+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="top-actions" id="topActions">
      <a href="index.html" class="action-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
          <polyline points="9 22 9 12 15 12 15 22" />
        </svg>
        <span>首页</span>
      </a>
      <a href="blog.html" class="action-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" />
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" />
        </svg>
        <span>总览</span>
      </a>
      <a href="blog.html?category=%E6%94%B6%E8%97%8F" class="action-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
        </svg>
        <span>收藏</span>
      </a>
    </div>

    <div class="cursor-glow" id="cursorGlow"></div>

    <div class="ambient-background">
      <div class="glow-orb orb-1"></div>
      <div class="glow-orb orb-2"></div>
      <div class="glow-orb orb-3"></div>
      <div class="glow-orb orb-4"></div>
      <div class="glow-orb orb-5"></div>
    </div>

    <canvas id="particles-canvas"></canvas>

    <div class="post-container">
      <article class="post-article" id="postArticle">
        <button class="post-back" id="postBack" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
          </svg>
          返回列表
        </button>

        <div id="postSkeleton">
          <div class="skeleton" style="width: 80px; height: 24px; margin-bottom: 20px;"></div>
          <div class="skeleton" style="width: 100%; height: 48px; margin-bottom: 12px;"></div>
          <div class="skeleton" style="width: 60%; height: 48px; margin-bottom: 24px;"></div>
          <div class="skeleton" style="width: 200px; height: 20px; margin-bottom: 48px;"></div>
          <div class="skeleton" style="width: 100%; height: 300px; margin-bottom: 32px;"></div>
          <div class="skeleton" style="width: 100%; height: 20px; margin-bottom: 12px;"></div>
          <div class="skeleton" style="width: 90%; height: 20px; margin-bottom: 12px;"></div>
          <div class="skeleton" style="width: 75%; height: 20px; margin-bottom: 12px;"></div>
        </div>

        <div id="postContent" style="display: none;"></div>
      </article>
    </div>

    <div class="empty-state" id="postEmpty" style="display: none;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
        <polyline points="14 2 14 8 20 8"></polyline>
      </svg>
      <p>文章不存在</p>
      <p style="font-size: 0.85rem;">
        <a href="blog.html" style="color: var(--accent-cyan); text-decoration: none;">返回博客列表</a>
      </p>
    </div>

    <script src="js/common.js"></script>
    <script src="js/notion-api.js"></script>
    <script>
      const params = new URLSearchParams(window.location.search);
      const postId = params.get("id");

      const skeletonEl = document.getElementById("postSkeleton");
      const contentEl = document.getElementById("postContent");
      const emptyEl = document.getElementById("postEmpty");
      const articleEl = document.getElementById("postArticle");
      const backBtn = document.getElementById("postBack");

      function goBack() {
        if (window.history.length > 1) {
          window.history.back();
          return;
        }
        window.location.href = "blog.html";
      }

      backBtn.addEventListener("click", goBack);

      function showEmpty() {
        skeletonEl.style.display = "none";
        backBtn.style.display = "none";
        emptyEl.style.display = "flex";
      }

      function saveReadingHistory(post) {
        try {
          const historyData = JSON.parse(localStorage.getItem("reading_history") || "[]");
          const filtered = historyData.filter((item) => item.id !== post.id);
          filtered.unshift({
            id: post.id,
            title: post.title,
            category: post.category,
            timestamp: Date.now(),
          });
          localStorage.setItem("reading_history", JSON.stringify(filtered.slice(0, 100)));
        } catch {
          // Ignore localStorage errors
        }
      }

      async function loadPost() {
        try {
          if (!postId) {
            showEmpty();
            return;
          }

          const post = await NotionAPI.getPost(postId);
          if (!post) {
            showEmpty();
            return;
          }

          document.title = `${post.title} - Share Everything`;
          document.querySelector('meta[name="description"]').content = post.excerpt || post.title;

          const esc = NotionAPI.escapeHtml;
          const style = NotionAPI.getCategoryStyle(post.category);
          const renderedContent = NotionAPI.renderBlocks(post.content || []);
          const safeTags = (post.tags || []).map((tag) => `#${esc(tag)}`).join(" ");

          contentEl.innerHTML = `
            <div class="post-header">
              <div class="post-category" style="background: ${style.bg}; color: ${style.color}; border: 1px solid ${style.border};">
                ${esc(post.category || "")}
              </div>
              <h1 class="post-title">${esc(post.title || "")}</h1>
              <div class="post-meta">
                <span>
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="16" y1="2" x2="16" y2="6"></line>
                    <line x1="8" y1="2" x2="8" y2="6"></line>
                    <line x1="3" y1="10" x2="21" y2="10"></line>
                  </svg>
                  ${esc(post.date || "")}
                </span>
                <span>
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polyline points="12 6 12 12 16 14"></polyline>
                  </svg>
                  ${esc(post.readTime || "")}
                </span>
                ${safeTags ? `<span>${safeTags}</span>` : ""}
              </div>
            </div>
            <div class="post-content">
              ${renderedContent}
            </div>
          `;

          skeletonEl.style.display = "none";
          contentEl.style.display = "block";
          contentEl.style.animation = "fadeInUp 0.6s ease both";
          saveReadingHistory(post);
        } catch (error) {
          console.error("Failed to load post:", error);
          showEmpty();
        }
      }

      loadPost();
    </script>
  </body>
</html>
